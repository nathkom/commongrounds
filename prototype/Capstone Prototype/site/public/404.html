<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Common Grounds</title>
    <script>
      // SPA redirect for GitHub Pages.
      // When GH Pages serves this 404.html, encode the intended path into
      // a query string and redirect to the repo root so index.html loads.
      // pathSegmentsToKeep = 1 preserves the /PENDA repo prefix.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
